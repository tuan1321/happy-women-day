
<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>𝓗𝓪𝓹𝓹𝔂 𝓑𝓲𝓻𝓽𝓱𝓭𝓪𝔂 𝓣𝓻𝓲𝓷𝓱 𝓝𝓾̛̃</title>

  <style>
    *,
    *::after,
    *::before {
      padding: 0;
      margin: 0;
      box-sizing: border-box;
    }

    :root {
      --dark-color: #000;
      --pink-1: #ffd6ef;
      --pink-2: #ff85c8;
      --pink-3: #ff4fa3;
      --pink-4: #e91e83;
      --pink-5: #a80f56;
      --green-1: #063d24;
      --green-2: #0b5d35;
      --green-3: #20b86a;
      --green-4: #24c875;
    }

    html,
    body {
      width: 100%;
      height: 100%;
    }

    body {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      min-height: 100vh;
      background-color: var(--dark-color);
      overflow: hidden;
      perspective: 1000px;
      padding: 50px 0;
      font-family: Georgia, "Times New Roman", serif;
    }

    .night {
      position: fixed;
      left: 50%;
      top: 0;
      transform: translateX(-50%);
      width: 100%;
      height: 100%;
      filter: blur(0.1vmin);
      background:
        radial-gradient(circle at 50% 16%, rgba(255, 210, 240, 0.22), transparent 10%),
        radial-gradient(ellipse at 50% 28%, rgba(255, 80, 170, 0.18), transparent 42%),
        radial-gradient(ellipse at 50% 95%, rgba(20, 120, 60, 0.34), transparent 55%),
        linear-gradient(to bottom, #020005 0%, #05000b 38%, #000 100%);
      z-index: 0;
    }

    .night::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(circle, rgba(255, 255, 255, 0.9) 0 1px, transparent 1.5px),
        radial-gradient(circle, rgba(255, 130, 210, 0.8) 0 1px, transparent 1.5px);
      background-size: 90px 90px, 140px 140px;
      background-position: 10px 20px, 70px 40px;
      opacity: 0.28;
      animation: stars 8s ease-in-out infinite alternate;
    }

    .moon {
      position: fixed;
      top: 9vmin;
      right: 14vmin;
      width: 9vmin;
      height: 9vmin;
      border-radius: 50%;
      background:
        radial-gradient(circle at 35% 35%, #fff, #ffd6ef 55%, #ff8bc8);
      box-shadow:
        0 0 4vmin rgba(255, 180, 225, 0.9),
        0 0 12vmin rgba(255, 70, 170, 0.45);
      opacity: 0.9;
      z-index: 2;
    }

    .happy-woman-day {
      color: white;
      font-size: clamp(30px, 5vw, 58px);
      position: fixed;
      top: 48px;
      left: 50%;
      transform: translateX(-50%);
      white-space: nowrap;
      font-style: italic;
      letter-spacing: 4px;
      z-index: 999;
      text-align: center;
      text-shadow:
        0 0 8px rgba(255, 255, 255, 0.9),
        0 0 22px rgba(255, 88, 170, 0.95),
        0 0 46px rgba(255, 37, 140, 0.7);
    }

    .subtitle {
      position: fixed;
      top: 122px;
      left: 50%;
      transform: translateX(-50%);
      color: #ffe6f5;
      font-size: clamp(15px, 2vw, 22px);
      letter-spacing: 2px;
      text-shadow:
        0 0 10px rgba(255, 90, 180, 0.8),
        0 0 24px rgba(255, 90, 180, 0.45);
      z-index: 999;
      white-space: nowrap;
      opacity: 0.92;
    }

    .field {
      position: fixed;
      left: 0;
      bottom: 0;
      width: 100vw;
      height: 78vh;
      overflow: hidden;
      z-index: 5;
      transform-style: preserve-3d;
    }

    .field::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: -12vmin;
      transform: translateX(-50%);
      width: 140vw;
      height: 35vmin;
      border-radius: 50%;
      background:
        radial-gradient(ellipse at center, rgba(0, 0, 0, 0.95), transparent 70%);
      z-index: 1000;
      pointer-events: none;
    }

    .flower {
      position: absolute;
      bottom: var(--bottom);
      left: var(--left);
      transform-origin: bottom center;
      z-index: var(--z);
      --fl-speed: 0.8s;
      --rot: 0deg;
      --scale: 1;
      animation: moving-flower var(--move-duration) linear infinite;
      animation-delay: var(--move-delay);
      opacity: var(--opacity);
      will-change: transform;
    }

    .flower__leafs {
      position: relative;
      animation: blooming-flower 2s backwards;
      animation-delay: var(--bloom-delay);
      transform: scale(var(--scale));
    }

    .flower__leafs::after {
      content: "";
      position: absolute;
      left: 0;
      top: 0;
      transform: translate(-50%, -100%);
      width: 7vmin;
      height: 7vmin;
      background-color: #ff5bbd;
      filter: blur(8vmin);
      opacity: 0.9;
    }

    .flower__leaf {
      position: absolute;
      bottom: 0;
      left: 50%;
      width: 8vmin;
      height: 11vmin;
      border-radius: 51% 49% 47% 53% / 44% 45% 55% 69%;
      background-color: var(--pink-1);
      background-image:
        radial-gradient(circle at 35% 18%, rgba(255, 255, 255, 0.8), transparent 17%),
        linear-gradient(to top, var(--pink-3), var(--pink-1));
      transform-origin: bottom center;
      opacity: 0.92;
      box-shadow:
        inset 0 0 2vmin rgba(255, 255, 255, 0.65),
        0 0 2vmin rgba(255, 80, 170, 0.35);
    }

    .flower__leaf--1 {
      transform: translate(-10%, 1%) rotateY(40deg) rotateX(-50deg);
    }

    .flower__leaf--2 {
      transform: translate(-50%, -4%) rotateX(40deg);
    }

    .flower__leaf--3 {
      transform: translate(-90%, 0%) rotateY(45deg) rotateX(50deg);
    }

    .flower__leaf--4 {
      width: 8vmin;
      height: 8vmin;
      transform-origin: bottom left;
      border-radius: 4vmin 10vmin 4vmin 4vmin;
      transform: translate(0%, 18%) rotateX(70deg) rotate(-43deg);
      background-image:
        radial-gradient(circle at 30% 20%, rgba(255, 255, 255, 0.72), transparent 18%),
        linear-gradient(to top, var(--pink-4), var(--pink-1));
      z-index: 1;
      opacity: 0.92;
    }

    .flower__leaf--5 {
      width: 6.2vmin;
      height: 8.4vmin;
      transform-origin: bottom center;
      transform: translate(-50%, -14%) rotateX(48deg) rotate(24deg);
      border-radius: 60% 40% 65% 35% / 60% 45% 55% 40%;
      background-image: linear-gradient(to top, var(--pink-5), var(--pink-2));
      z-index: 2;
      opacity: 0.92;
    }

    .flower__leaf--6 {
      width: 6.2vmin;
      height: 8.4vmin;
      transform-origin: bottom center;
      transform: translate(-50%, -14%) rotateX(48deg) rotate(-24deg);
      border-radius: 40% 60% 35% 65% / 45% 60% 40% 55%;
      background-image: linear-gradient(to top, var(--pink-5), var(--pink-2));
      z-index: 2;
      opacity: 0.9;
    }

    .flower__white-circle {
      position: absolute;
      left: -3.2vmin;
      top: -3vmin;
      width: 8.2vmin;
      height: 4vmin;
      border-radius: 50%;
      background-color: #fff6fb;
      box-shadow:
        0 0 1.2vmin rgba(255, 180, 220, 0.8),
        inset 0 0 1vmin rgba(255, 190, 220, 0.45);
      z-index: 5;
    }

    .flower__white-circle::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 45%;
      transform: translate(-50%, -50%);
      width: 60%;
      height: 60%;
      border-radius: inherit;
      background-image:
        repeating-linear-gradient(300deg, rgba(120, 0, 70, 0.05) 0px, rgba(120, 0, 70, 0.05) 1px, transparent 1px, transparent 12px),
        repeating-linear-gradient(45deg, rgba(120, 0, 70, 0.05) 0px, rgba(120, 0, 70, 0.05) 1px, transparent 1px, transparent 12px),
        linear-gradient(90deg, #ffe96e, #ffbd00);
    }

    .flower__line {
      height: var(--line-height);
      width: var(--line-width);
      background-image:
        linear-gradient(to left, rgba(0, 0, 0, 0.25), transparent, rgba(255, 255, 255, 0.22)),
        linear-gradient(to top, transparent 10%, var(--green-2), var(--green-3));
      box-shadow:
        inset 0 0 2px rgba(0, 0, 0, 0.6),
        0 0 1vmin rgba(32, 184, 106, 0.26);
      animation: grow-flower-tree 4s backwards;
      animation-delay: var(--grow-delay);
    }

    .flower__line__leaf {
      --w: 7vmin;
      --h: calc(var(--w) + 2vmin);
      position: absolute;
      top: 20%;
      left: 90%;
      width: var(--w);
      height: var(--h);
      border-top-right-radius: var(--h);
      border-bottom-left-radius: var(--h);
      background-image: linear-gradient(to top, rgba(11, 93, 53, 0.5), var(--green-4));
      box-shadow: 0 0 1vmin rgba(36, 200, 117, 0.25);
    }

    .flower__line__leaf--1 {
      transform: rotate(70deg) rotateY(30deg);
      animation: blooming-leaf-right var(--fl-speed) 1.6s backwards;
    }

    .flower__line__leaf--2 {
      top: 45%;
      transform: rotate(70deg) rotateY(30deg);
      animation: blooming-leaf-right var(--fl-speed) 1.4s backwards;
    }

    .flower__line__leaf--3,
    .flower__line__leaf--4,
    .flower__line__leaf--6 {
      border-top-right-radius: 0;
      border-bottom-left-radius: 0;
      border-top-left-radius: var(--h);
      border-bottom-right-radius: var(--h);
      left: -460%;
      top: 12%;
      transform: rotate(-70deg) rotateY(30deg);
    }

    .flower__line__leaf--3 {
      animation: blooming-leaf-left var(--fl-speed) 1.2s backwards;
    }

    .flower__line__leaf--4 {
      top: 40%;
      animation: blooming-leaf-left var(--fl-speed) 1s backwards;
    }

    .flower__line__leaf--5 {
      top: 0;
      transform-origin: left;
      transform: rotate(70deg) rotateY(30deg) scale(0.6);
      animation: blooming-leaf-right var(--fl-speed) 1.8s backwards;
    }

    .flower__line__leaf--6 {
      top: -2%;
      left: -450%;
      transform-origin: right;
      transform: rotate(-70deg) rotateY(30deg) scale(0.6);
      animation: blooming-leaf-left var(--fl-speed) 2s backwards;
    }

    .flower__light {
      position: absolute;
      bottom: 0vmin;
      width: 1vmin;
      height: 1vmin;
      background-color: #ffe45c;
      border-radius: 50%;
      filter: blur(0.2vmin);
      animation: light-ans 4s linear infinite backwards;
      box-shadow:
        0 0 1vmin rgba(255, 228, 92, 0.9),
        0 0 2vmin rgba(255, 196, 40, 0.65);
    }

    .flower__light:nth-child(odd) {
      background-color: #ff6fc7;
      box-shadow:
        0 0 1vmin rgba(255, 111, 199, 0.95),
        0 0 2.2vmin rgba(255, 45, 155, 0.75);
    }

    .flower__light--1 {
      left: -2vmin;
      animation-delay: 1s;
    }

    .flower__light--2 {
      left: 3vmin;
      animation-delay: 0.5s;
    }

    .flower__light--3 {
      left: -6vmin;
      animation-delay: 0.3s;
    }

    .flower__light--4 {
      left: 6vmin;
      animation-delay: 0.9s;
    }

    .grass-layer {
      position: fixed;
      left: 0;
      bottom: 0;
      width: 100vw;
      height: 40vh;
      z-index: 4;
      pointer-events: none;
      overflow: hidden;
    }

    .grass {
      position: absolute;
      bottom: -2vmin;
      left: var(--left);
      width: 1.3vmin;
      height: var(--height);
      border-radius: 100% 0 0 0;
      border-left: var(--width) solid var(--color);
      transform-origin: bottom center;
      transform: rotate(var(--rot));
      opacity: var(--opacity);
      filter: drop-shadow(0 0 0.8vmin rgba(31, 207, 96, 0.25));
      animation: grass-sway var(--duration) ease-in-out infinite;
      animation-delay: var(--delay);
    }

    .petal-rain {
      position: fixed;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 20;
    }

    .falling-petal {
      position: absolute;
      top: -10vh;
      left: var(--left);
      width: var(--size);
      height: calc(var(--size) * 1.35);
      border-radius: 60% 40% 65% 35%;
      background:
        radial-gradient(circle at 35% 25%, rgba(255, 255, 255, 0.8), transparent 18%),
        linear-gradient(135deg, #ffd1ec, #ff5eb0 60%, #e91e83);
      opacity: var(--opacity);
      transform: rotate(var(--rot));
      animation: petal-fall var(--duration) linear infinite;
      animation-delay: var(--delay);
      filter: drop-shadow(0 0 1vmin rgba(255, 100, 180, 0.25));
    }

    .counter-badge {
      position: fixed;
      right: 20px;
      bottom: 18px;
      z-index: 1001;
      color: rgba(255, 235, 248, 0.8);
      font-size: 14px;
      letter-spacing: 1px;
      background: rgba(255, 80, 170, 0.12);
      border: 1px solid rgba(255, 150, 210, 0.28);
      border-radius: 999px;
      padding: 8px 14px;
      backdrop-filter: blur(6px);
      box-shadow: 0 0 18px rgba(255, 80, 170, 0.2);
    }

    .not-loaded * {
      animation-play-state: paused !important;
    }

    @keyframes stars {
      0% {
        opacity: 0.18;
      }

      100% {
        opacity: 0.34;
      }
    }

    @keyframes light-ans {
      0% {
        opacity: 0;
        transform: translateY(0vmin);
      }

      25% {
        opacity: 1;
        transform: translateY(-5vmin) translateX(-2vmin);
      }

      50% {
        opacity: 1;
        transform: translateY(-15vmin) translateX(2vmin);
        filter: blur(0.2vmin);
      }

      75% {
        transform: translateY(-20vmin) translateX(-2vmin);
        filter: blur(0.2vmin);
      }

      100% {
        transform: translateY(-30vmin);
        opacity: 0;
        filter: blur(1vmin);
      }
    }

    @keyframes moving-flower {
      0%,
      100% {
        transform: rotate(var(--rot)) scale(var(--scale));
      }

      50% {
        transform: rotate(calc(var(--rot) - var(--sway))) scale(var(--scale));
      }
    }

    @keyframes blooming-leaf-right {
      0% {
        transform-origin: left;
        transform: rotate(70deg) rotateY(30deg) scale(0);
      }
    }

    @keyframes blooming-leaf-left {
      0% {
        transform-origin: right;
        transform: rotate(-70deg) rotateY(30deg) scale(0);
      }
    }

    @keyframes grow-flower-tree {
      0% {
        height: 0;
        border-radius: 1vmin;
      }
    }

    @keyframes blooming-flower {
      0% {
        transform: scale(0);
      }
    }

    @keyframes grass-sway {
      0%,
      100% {
        transform: rotate(var(--rot));
      }

      50% {
        transform: rotate(calc(var(--rot) + var(--sway)));
      }
    }

    @keyframes petal-fall {
      0% {
        transform: translate3d(0, -10vh, 0) rotate(var(--rot));
      }

      100% {
        transform: translate3d(var(--drift), 115vh, 0) rotate(calc(var(--rot) + 360deg));
      }
    }

    @media (max-width: 768px) {
      .happy-woman-day {
        font-size: 30px;
        top: 38px;
        letter-spacing: 2px;
      }

      .subtitle {
        top: 94px;
        font-size: 14px;
      }

      .moon {
        top: 11vmin;
        right: 8vmin;
        width: 7vmin;
        height: 7vmin;
      }

      .counter-badge {
        font-size: 12px;
        right: 12px;
        bottom: 12px;
      }
    }
  </style>
</head>

<body class="not-loaded">
  <div class="night"></div>
  <div class="moon"></div>

  <h1 class="happy-woman-day">𝓗𝓪𝓹𝓹𝔂 𝓑𝓲𝓻𝓽𝓱𝓭𝓪𝔂 𝓣𝓻𝓲𝓷𝓱 𝓝𝓾̛̃</h1>
  <div class="subtitle">999 đóa hoa hồng anh Tuấn Anh dành tặng em</div>

  <div class="grass-layer" id="grassLayer"></div>
  <div class="field" id="field"></div>
  <div class="petal-rain" id="petalRain"></div>

  <div class="counter-badge">999 roses</div>

  <template id="flowerTemplate">
    <div class="flower">
      <div class="flower__leafs">
        <div class="flower__leaf flower__leaf--1"></div>
        <div class="flower__leaf flower__leaf--2"></div>
        <div class="flower__leaf flower__leaf--3"></div>
        <div class="flower__leaf flower__leaf--4"></div>
        <div class="flower__leaf flower__leaf--5"></div>
        <div class="flower__leaf flower__leaf--6"></div>
        <div class="flower__white-circle"></div>

        <div class="flower__light flower__light--1"></div>
        <div class="flower__light flower__light--2"></div>
        <div class="flower__light flower__light--3"></div>
        <div class="flower__light flower__light--4"></div>
      </div>

      <div class="flower__line">
        <div class="flower__line__leaf flower__line__leaf--1"></div>
        <div class="flower__line__leaf flower__line__leaf--2"></div>
        <div class="flower__line__leaf flower__line__leaf--3"></div>
        <div class="flower__line__leaf flower__line__leaf--4"></div>
        <div class="flower__line__leaf flower__line__leaf--5"></div>
        <div class="flower__line__leaf flower__line__leaf--6"></div>
      </div>
    </div>
  </template>

  <script>
    const FLOWER_COUNT = 999;
    const GRASS_COUNT = 180;
    const FALLING_PETAL_COUNT = 45;

    const field = document.getElementById("field");
    const flowerTemplate = document.getElementById("flowerTemplate");
    const grassLayer = document.getElementById("grassLayer");
    const petalRain = document.getElementById("petalRain");

    function random(min, max) {
      return Math.random() * (max - min) + min;
    }

    function randomInt(min, max) {
      return Math.floor(random(min, max + 1));
    }

    function createFlower(index) {
      const node = flowerTemplate.content.firstElementChild.cloneNode(true);

      const row = index / FLOWER_COUNT;
      const depth = Math.pow(row, 1.8);

      const left = random(-8, 108);
      const bottom = random(-4, 62) * depth;
      const scale = 0.1 + depth * 0.72 + random(-0.035, 0.035);
      const height = 18 + depth * 58 + random(-3, 5);
      const lineWidth = 0.35 + depth * 1.15;
      const rotation = random(-38, 38);
      const sway = random(1.5, 5.5);
      const opacity = 0.28 + depth * 0.72;
      const z = Math.round(depth * 900);

      node.style.setProperty("--left", `${left}%`);
      node.style.setProperty("--bottom", `${bottom}vmin`);
      node.style.setProperty("--scale", Math.max(scale, 0.08).toFixed(3));
      node.style.setProperty("--line-height", `${height.toFixed(2)}vmin`);
      node.style.setProperty("--line-width", `${lineWidth.toFixed(2)}vmin`);
      node.style.setProperty("--rot", `${rotation.toFixed(2)}deg`);
      node.style.setProperty("--sway", `${sway.toFixed(2)}deg`);
      node.style.setProperty("--opacity", opacity.toFixed(3));
      node.style.setProperty("--z", z);
      node.style.setProperty("--move-duration", `${random(3.8, 7.5).toFixed(2)}s`);
      node.style.setProperty("--move-delay", `${random(-5, 0).toFixed(2)}s`);
      node.style.setProperty("--bloom-delay", `${random(0.3, 4.8).toFixed(2)}s`);
      node.style.setProperty("--grow-delay", `${random(0.1, 1.8).toFixed(2)}s`);

      if (scale < 0.22) {
        node.querySelectorAll(".flower__line__leaf--5, .flower__line__leaf--6, .flower__light").forEach((el) => {
          el.style.display = "none";
        });
      }

      if (scale < 0.16) {
        node.querySelectorAll(".flower__line__leaf--3, .flower__line__leaf--4").forEach((el) => {
          el.style.display = "none";
        });
      }

      return node;
    }

    function createGrass(index) {
      const grass = document.createElement("div");
      grass.className = "grass";

      grass.style.setProperty("--left", `${random(-3, 103)}%`);
      grass.style.setProperty("--height", `${random(16, 48)}vmin`);
      grass.style.setProperty("--width", `${random(0.35, 1.1)}vmin`);
      grass.style.setProperty("--rot", `${random(-45, 45)}deg`);
      grass.style.setProperty("--sway", `${random(-4, 4)}deg`);
      grass.style.setProperty("--duration", `${random(2.2, 5.5)}s`);
      grass.style.setProperty("--delay", `${random(-5, 0)}s`);
      grass.style.setProperty("--opacity", `${random(0.35, 0.9)}`);

      const green = Math.random() > 0.45 ? "#1fcf60" : "#159c45";
      grass.style.setProperty("--color", green);

      return grass;
    }

    function createFallingPetal() {
      const petal = document.createElement("div");
      petal.className = "falling-petal";

      petal.style.setProperty("--left", `${random(-5, 105)}vw`);
      petal.style.setProperty("--size", `${random(0.7, 1.8)}vmin`);
      petal.style.setProperty("--opacity", `${random(0.25, 0.75)}`);
      petal.style.setProperty("--rot", `${random(0, 360)}deg`);
      petal.style.setProperty("--drift", `${random(-18, 18)}vw`);
      petal.style.setProperty("--duration", `${random(9, 18)}s`);
      petal.style.setProperty("--delay", `${random(-18, 0)}s`);

      return petal;
    }

    function renderScene() {
      const flowerFragment = document.createDocumentFragment();
      const grassFragment = document.createDocumentFragment();
      const petalFragment = document.createDocumentFragment();

      for (let i = 0; i < FLOWER_COUNT; i++) {
        flowerFragment.appendChild(createFlower(i));
      }

      for (let i = 0; i < GRASS_COUNT; i++) {
        grassFragment.appendChild(createGrass(i));
      }

      for (let i = 0; i < FALLING_PETAL_COUNT; i++) {
        petalFragment.appendChild(createFallingPetal());
      }

      field.appendChild(flowerFragment);
      grassLayer.appendChild(grassFragment);
      petalRain.appendChild(petalFragment);
    }

    window.addEventListener("load", () => {
      renderScene();

      requestAnimationFrame(() => {
        document.body.classList.remove("not-loaded");
      });
    });
  </script>
</body>
</html>
