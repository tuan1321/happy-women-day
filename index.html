<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>𝓗𝓪𝓹𝓹𝔂 𝓑𝓲𝓻𝓽𝓱𝓭𝓪𝔂 𝓣𝓻𝓲𝓷𝓱 𝓝𝓾̛̃</title>

  <style>
    *,
    *::after,
    *::before {
      padding: 0;
      margin: 0;
      box-sizing: border-box;
    }

    :root {
      --dark-color: #000;
      --rose-1: #ffb6d9;
      --rose-2: #ff6fb5;
      --rose-3: #ff2f8f;
      --rose-4: #c91863;
      --rose-5: #7a0f3c;

      --stem-1: #0b4f2f;
      --stem-2: #18824d;
      --leaf-1: #0d6b3a;
      --leaf-2: #21b36b;
      --glow-pink: rgba(255, 80, 170, 0.75);
    }

    body {
      min-height: 100vh;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 35%, rgba(255, 64, 160, 0.13), transparent 32%),
        radial-gradient(circle at 20% 90%, rgba(39, 179, 108, 0.18), transparent 25%),
        radial-gradient(circle at 80% 90%, rgba(39, 179, 108, 0.18), transparent 25%),
        #000;
      display: flex;
      justify-content: center;
      align-items: flex-end;
      padding-bottom: 4vmin;
      font-family: Georgia, "Times New Roman", serif;
      perspective: 1000px;
    }

    .title {
      position: fixed;
      top: 5vmin;
      left: 50%;
      transform: translateX(-50%);
      color: #fff;
      font-size: clamp(30px, 5vw, 62px);
      font-weight: 700;
      font-style: italic;
      letter-spacing: 0.08em;
      white-space: nowrap;
      text-shadow:
        0 0 1vmin rgba(255, 255, 255, 0.8),
        0 0 3vmin rgba(255, 105, 190, 0.9),
        0 0 6vmin rgba(255, 60, 160, 0.55);
      z-index: 1000;
    }

    .scene {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    .moon-glow {
      position: absolute;
      left: 50%;
      top: 20%;
      transform: translateX(-50%);
      width: 70vmin;
      height: 70vmin;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 80, 170, 0.13), transparent 62%);
      filter: blur(1vmin);
      pointer-events: none;
    }

    .garden {
      position: absolute;
      left: 50%;
      bottom: 0;
      width: 100vmin;
      height: 82vmin;
      transform: translateX(-50%);
    }

    .rose {
      position: absolute;
      bottom: 0;
      transform-origin: bottom center;
      animation: rose-sway 4s ease-in-out infinite;
    }

    .rose--1  { left: 50%; bottom: 4vmin;  --h: 58vmin; --s: 1.08; --r: 0deg;    --delay: 0s;   z-index: 18; }
    .rose--2  { left: 39%; bottom: 3vmin;  --h: 50vmin; --s: 0.88; --r: -15deg;  --delay: .2s;  z-index: 16; }
    .rose--3  { left: 61%; bottom: 3vmin;  --h: 52vmin; --s: 0.9;  --r: 16deg;   --delay: .35s; z-index: 16; }
    .rose--4  { left: 30%; bottom: 0vmin;  --h: 43vmin; --s: 0.72; --r: -24deg;  --delay: .5s;  z-index: 12; }
    .rose--5  { left: 70%; bottom: 0vmin;  --h: 44vmin; --s: 0.74; --r: 25deg;   --delay: .65s; z-index: 12; }
    .rose--6  { left: 46%; bottom: 1vmin;  --h: 46vmin; --s: 0.78; --r: -7deg;   --delay: .8s;  z-index: 15; }
    .rose--7  { left: 55%; bottom: 1vmin;  --h: 47vmin; --s: 0.8;  --r: 8deg;    --delay: .95s; z-index: 15; }
    .rose--8  { left: 22%; bottom: -1vmin; --h: 37vmin; --s: 0.62; --r: -34deg;  --delay: 1.1s; z-index: 9; }
    .rose--9  { left: 78%; bottom: -1vmin; --h: 38vmin; --s: 0.64; --r: 34deg;   --delay: 1.25s; z-index: 9; }
    .rose--10 { left: 13%; bottom: -3vmin; --h: 31vmin; --s: 0.52; --r: -42deg;  --delay: 1.4s; z-index: 6; }
    .rose--11 { left: 87%; bottom: -3vmin; --h: 32vmin; --s: 0.54; --r: 42deg;   --delay: 1.55s; z-index: 6; }
    .rose--12 { left: 50%; bottom: -5vmin; --h: 35vmin; --s: 0.58; --r: 0deg;    --delay: 1.7s; z-index: 20; }

    .stem {
      width: 1.35vmin;
      height: var(--h);
      border-radius: 2vmin;
      background:
        linear-gradient(to right, rgba(0, 0, 0, 0.35), transparent, rgba(255, 255, 255, 0.18)),
        linear-gradient(to top, var(--stem-1), var(--stem-2));
      box-shadow:
        inset 0 0 0.6vmin rgba(0, 0, 0, 0.6),
        0 0 1vmin rgba(31, 184, 104, 0.25);
      transform: rotate(var(--r));
      transform-origin: bottom center;
      animation: grow-stem 2.3s ease-out backwards;
      animation-delay: var(--delay);
    }

    .flower-head {
      position: absolute;
      left: 50%;
      top: calc(var(--h) * -1);
      width: 14vmin;
      height: 14vmin;
      transform:
        translate(-50%, -4vmin)
        scale(var(--s))
        rotate(calc(var(--r) * -0.45));
      transform-origin: center bottom;
      animation: bloom 1.5s ease-out backwards;
      animation-delay: calc(var(--delay) + 1.4s);
      filter:
        drop-shadow(0 0 1vmin rgba(255, 108, 188, 0.7))
        drop-shadow(0 0 3vmin rgba(255, 40, 145, 0.35));
    }

    .flower-head::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 51%;
      transform: translate(-50%, -50%);
      width: 8vmin;
      height: 8vmin;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 100, 180, 0.4), transparent 65%);
      filter: blur(2vmin);
      z-index: -1;
    }

    .petal {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 6.8vmin;
      height: 8.8vmin;
      border-radius: 65% 35% 65% 35% / 70% 45% 55% 35%;
      transform-origin: 50% 92%;
      background:
        radial-gradient(circle at 35% 25%, rgba(255, 255, 255, 0.8), transparent 20%),
        linear-gradient(135deg, var(--rose-1), var(--rose-2) 45%, var(--rose-4));
      box-shadow:
        inset 0 -1vmin 2vmin rgba(122, 15, 60, 0.35),
        inset 0 0.6vmin 1.2vmin rgba(255, 255, 255, 0.35);
      opacity: 0.96;
    }

    .petal--1  { transform: translate(-50%, -74%) rotate(0deg) scale(0.95); }
    .petal--2  { transform: translate(-50%, -74%) rotate(45deg) scale(0.95); }
    .petal--3  { transform: translate(-50%, -74%) rotate(90deg) scale(0.95); }
    .petal--4  { transform: translate(-50%, -74%) rotate(135deg) scale(0.95); }
    .petal--5  { transform: translate(-50%, -74%) rotate(180deg) scale(0.95); }
    .petal--6  { transform: translate(-50%, -74%) rotate(225deg) scale(0.95); }
    .petal--7  { transform: translate(-50%, -74%) rotate(270deg) scale(0.95); }
    .petal--8  { transform: translate(-50%, -74%) rotate(315deg) scale(0.95); }

    .petal--9 {
      width: 5.3vmin;
      height: 7.2vmin;
      transform: translate(-50%, -66%) rotate(22deg) scale(0.78);
      background:
        radial-gradient(circle at 35% 25%, rgba(255, 255, 255, 0.7), transparent 18%),
        linear-gradient(135deg, #ffc4e4, #ff4fa7 48%, #b91558);
      z-index: 5;
    }

    .petal--10 {
      width: 5.3vmin;
      height: 7.2vmin;
      transform: translate(-50%, -66%) rotate(112deg) scale(0.78);
      background:
        radial-gradient(circle at 35% 25%, rgba(255, 255, 255, 0.7), transparent 18%),
        linear-gradient(135deg, #ffc4e4, #ff4fa7 48%, #b91558);
      z-index: 5;
    }

    .petal--11 {
      width: 5.3vmin;
      height: 7.2vmin;
      transform: translate(-50%, -66%) rotate(202deg) scale(0.78);
      background:
        radial-gradient(circle at 35% 25%, rgba(255, 255, 255, 0.7), transparent 18%),
        linear-gradient(135deg, #ffc4e4, #ff4fa7 48%, #b91558);
      z-index: 5;
    }

    .petal--12 {
      width: 5.3vmin;
      height: 7.2vmin;
      transform: translate(-50%, -66%) rotate(292deg) scale(0.78);
      background:
        radial-gradient(circle at 35% 25%, rgba(255, 255, 255, 0.7), transparent 18%),
        linear-gradient(135deg, #ffc4e4, #ff4fa7 48%, #b91558);
      z-index: 5;
    }

    .rose-core {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 5vmin;
      height: 5vmin;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background:
        radial-gradient(circle at 38% 32%, #ffd6ea, transparent 17%),
        conic-gradient(
          from 40deg,
          #ffb7d9,
          #ff5ba9,
          #c91863,
          #ff8bc7,
          #9f124c,
          #ff6fb5,
          #ffb7d9
        );
      box-shadow:
        inset 0 0 1.2vmin rgba(80, 0, 35, 0.55),
        0 0 1.5vmin rgba(255, 99, 190, 0.65);
      z-index: 10;
    }

    .rose-core::before {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      width: 2.7vmin;
      height: 2.7vmin;
      transform: translate(-50%, -50%) rotate(35deg);
      border-radius: 60% 40% 60% 40%;
      background: linear-gradient(135deg, #ffecf6, #ff5fae 45%, #9c0d48);
      box-shadow: inset 0 0 0.7vmin rgba(80, 0, 35, 0.45);
    }

    .leaf {
      position: absolute;
      width: 8vmin;
      height: 4.2vmin;
      border-radius: 100% 0 100% 0;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.18), transparent 25%),
        linear-gradient(to bottom right, var(--leaf-2), var(--leaf-1));
      box-shadow:
        inset 0 -0.5vmin 1vmin rgba(0, 0, 0, 0.35),
        0 0 1vmin rgba(33, 179, 107, 0.18);
      transform-origin: left center;
      animation: leaf-open 1.2s ease-out backwards;
    }

    .leaf::after {
      content: "";
      position: absolute;
      left: 12%;
      top: 50%;
      width: 78%;
      height: 0.18vmin;
      background: rgba(255, 255, 255, 0.35);
      transform: rotate(-18deg);
    }

    .leaf--1 {
      left: 0.8vmin;
      bottom: calc(var(--h) * 0.38);
      transform: rotate(-25deg);
      animation-delay: calc(var(--delay) + 1s);
    }

    .leaf--2 {
      left: -7.5vmin;
      bottom: calc(var(--h) * 0.55);
      transform: rotate(205deg);
      animation-delay: calc(var(--delay) + 1.15s);
    }

    .leaf--3 {
      left: 0.7vmin;
      bottom: calc(var(--h) * 0.72);
      transform: rotate(-35deg) scale(0.72);
      animation-delay: calc(var(--delay) + 1.3s);
    }

    .leaf--4 {
      left: -6vmin;
      bottom: calc(var(--h) * 0.25);
      transform: rotate(210deg) scale(0.76);
      animation-delay: calc(var(--delay) + 1.45s);
    }

    .sparkle {
      position: absolute;
      bottom: 8vmin;
      width: 0.8vmin;
      height: 0.8vmin;
      border-radius: 50%;
      background: #ffd9ef;
      box-shadow:
        0 0 1vmin rgba(255, 160, 220, 1),
        0 0 2.5vmin rgba(255, 70, 170, 0.9);
      filter: blur(0.05vmin);
      animation: sparkle-fly 5s linear infinite;
      opacity: 0;
      z-index: 50;
    }

    .sparkle:nth-child(1)  { left: 25%; animation-delay: 0s; }
    .sparkle:nth-child(2)  { left: 32%; animation-delay: .8s; }
    .sparkle:nth-child(3)  { left: 43%; animation-delay: 1.6s; }
    .sparkle:nth-child(4)  { left: 52%; animation-delay: .4s; }
    .sparkle:nth-child(5)  { left: 61%; animation-delay: 2.1s; }
    .sparkle:nth-child(6)  { left: 72%; animation-delay: 1.2s; }
    .sparkle:nth-child(7)  { left: 36%; animation-delay: 2.7s; }
    .sparkle:nth-child(8)  { left: 66%; animation-delay: 3.2s; }
    .sparkle:nth-child(9)  { left: 48%; animation-delay: 3.8s; }
    .sparkle:nth-child(10) { left: 57%; animation-delay: 4.4s; }

    .grass {
      position: absolute;
      bottom: -2vmin;
      width: 2vmin;
      height: var(--grass-h);
      border-radius: 100% 0 0 0;
      border-left: 0.8vmin solid var(--grass-color);
      transform-origin: bottom center;
      filter: drop-shadow(0 0 0.7vmin rgba(28, 180, 88, 0.45));
      animation: grass-sway 3s ease-in-out infinite;
      z-index: 25;
    }

    .grass:nth-child(odd) {
      --grass-color: #159c45;
    }

    .grass:nth-child(even) {
      --grass-color: #1fcf60;
    }

    .grass--1  { left: 4%;  --grass-h: 36vmin; transform: rotate(30deg); animation-delay: 0s; }
    .grass--2  { left: 9%;  --grass-h: 52vmin; transform: rotate(16deg); animation-delay: .2s; }
    .grass--3  { left: 16%; --grass-h: 28vmin; transform: rotate(38deg); animation-delay: .4s; }
    .grass--4  { left: 25%; --grass-h: 34vmin; transform: rotate(-25deg); animation-delay: .6s; }
    .grass--5  { left: 35%; --grass-h: 24vmin; transform: rotate(30deg); animation-delay: .8s; }
    .grass--6  { left: 44%; --grass-h: 30vmin; transform: rotate(-18deg); animation-delay: 1s; }
    .grass--7  { left: 56%; --grass-h: 31vmin; transform: rotate(20deg); animation-delay: 1.2s; }
    .grass--8  { left: 66%; --grass-h: 26vmin; transform: rotate(-30deg); animation-delay: 1.4s; }
    .grass--9  { left: 76%; --grass-h: 35vmin; transform: rotate(28deg); animation-delay: 1.6s; }
    .grass--10 { left: 84%; --grass-h: 45vmin; transform: rotate(-14deg); animation-delay: 1.8s; }
    .grass--11 { left: 91%; --grass-h: 34vmin; transform: rotate(-32deg); animation-delay: 2s; }
    .grass--12 { left: 97%; --grass-h: 29vmin; transform: rotate(-42deg); animation-delay: 2.2s; }

    .ground-shadow {
      position: absolute;
      left: 50%;
      bottom: -7vmin;
      transform: translateX(-50%);
      width: 90vmin;
      height: 20vmin;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0, 0, 0, 0.95), transparent 70%);
      z-index: 200;
      pointer-events: none;
    }

    @keyframes grow-stem {
      0% {
        height: 0;
        opacity: 0;
      }

      100% {
        height: var(--h);
        opacity: 1;
      }
    }

    @keyframes bloom {
      0% {
        opacity: 0;
        transform:
          translate(-50%, -4vmin)
          scale(0)
          rotate(calc(var(--r) * -0.45));
      }

      70% {
        opacity: 1;
        transform:
          translate(-50%, -4vmin)
          scale(calc(var(--s) * 1.08))
          rotate(calc(var(--r) * -0.45));
      }

      100% {
        opacity: 1;
        transform:
          translate(-50%, -4vmin)
          scale(var(--s))
          rotate(calc(var(--r) * -0.45));
      }
    }

    @keyframes leaf-open {
      0% {
        opacity: 0;
        transform: scale(0) rotate(0deg);
      }
    }

    @keyframes rose-sway {
      0%, 100% {
        margin-left: 0;
      }

      50% {
        margin-left: 0.8vmin;
      }
    }

    @keyframes sparkle-fly {
      0% {
        opacity: 0;
        transform: translateY(0) translateX(0) scale(0.5);
      }

      15% {
        opacity: 1;
      }

      50% {
        opacity: 1;
        transform: translateY(-25vmin) translateX(2vmin) scale(1);
      }

      100% {
        opacity: 0;
        transform: translateY(-55vmin) translateX(-2vmin) scale(0.3);
      }
    }

    @keyframes grass-sway {
      0%, 100% {
        margin-left: 0;
      }

      50% {
        margin-left: 1vmin;
      }
    }

    @media (max-width: 700px) {
      .title {
        top: 7vmin;
        font-size: 8vw;
      }

      .garden {
        transform: translateX(-50%) scale(0.88);
        bottom: -4vmin;
      }
    }
  </style>
</head>
